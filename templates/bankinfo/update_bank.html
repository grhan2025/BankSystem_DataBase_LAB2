{% extends "base.html" %}
{% block title %}修改银行信息{% endblock %}
{% block nav_bank %}active{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:center; justify-content:space-between;">
  <div>
    <div class="page-title">修改银行信息</div>
    <div class="page-subtitle">分行网点：<strong>{{ bank.0 }}</strong></div>
  </div>
  <a href="{% url 'banksystem:bankinfo' %}" class="bbtn">
    <i class="ti ti-arrow-left"></i> 返回银行列表
  </a>
</div>

<div class="bcard" style="max-width:560px;">
  <div class="bcard-header">
    <i class="ti ti-edit" style="color:#534AB7;" aria-hidden="true"></i>
    <span class="bcard-header-title">编辑分行基础资产</span>
  </div>
  <div class="bcard-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      
      <div class="bform-group">
        <label for="bank_name" class="bform-label">银行名称 (不可更改)</label>
        <input type="text" class="bform-control" id="bank_name" name="bank_name" value="{{ bank.0 }}" style="background-color: #f1f3f5; color: #6c757d;" readonly>
        <div class="bform-hint">作为系统核心主键，银行名称一经创建无法在线更改</div>
      </div>
      
      <div class="bform-group">
        <label for="location" class="bform-label">地理位置</label>
        <input type="text" class="bform-control" id="location" name="location" value="{{ bank.1 }}" placeholder="请输入分行详细地址" required>
      </div>
      
      <div class="bform-group">
        <label for="asset" class="bform-label">资产总额 (¥)</label>
        <input type="number" step="0.01" class="bform-control" id="asset" name="asset" value="{{ bank.2 }}" placeholder="以元为单位" required>
      </div>
      
      <div class="bform-group">
        <label for="image" class="bform-label">分行形象图像</label>
        <input type="file" class="bform-control" id="image" name="image" style="padding: 6px 12px;">
        <div class="bform-hint">支持 jpg、png 格式网点建筑或标志实拍图</div>
      </div>

      <div style="margin-top:24px;">
        <button type="submit" class="bbtn bbtn-primary">
          <i class="ti ti-device-floppy"></i> 保存银行信息
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
