{% extends "base.html" %}
{% block title %}修改员工信息{% endblock %}
{% block nav_bank %}active{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:center; justify-content:space-between;">
  <div>
    <div class="page-title">修改职员档案</div>
    <div class="page-subtitle">员工ID：<code>{{ employee_id }}</code> | 归属部门：<code>{{ department_id }}</code></div>
  </div>
  <a href="javascript:history.back()" class="bbtn">
    <i class="ti ti-arrow-left"></i> 返回
  </a>
</div>

<div class="bcard" style="max-width:600px;">
  <div class="bcard-header">
    <i class="ti ti-edit" style="color:#534AB7;" aria-hidden="true"></i>
    <span class="bcard-header-title">编辑员工人事档案</span>
  </div>
  <div class="bcard-body">
    <form method="post">
      {% csrf_token %}
      
      <div class="bform-group">
        <label for="phone" class="bform-label">联系电话</label>
        <input type="tel" class="bform-control" id="phone" name="phone" value="{{ phone }}" placeholder="请输入11位最新手机号" required>
        <div class="bform-hint">职员核心移动联系方式，允许编辑</div>
      </div>
      
      <div class="bform-group">
        <label for="address" class="bform-label">现居住地址</label>
        <input type="text" class="bform-control" id="address" name="address" value="{{ address }}" placeholder="若留空则保持原住址不变">
        <div class="bform-hint">请输入最新的常住联络地址</div>
      </div>
      
      <div class="bform-group">
        <label for="start_work_date" class="bform-label">合同入职日期 (不可更改)</label>
        <input type="date" class="bform-control" id="start_work_date" name="start_work_date" value="{{ start_work_date }}" style="background-color: #f1f3f5; color: #6c757d;" readonly>
      </div>

      <div style="margin-top:24px;">
        <button type="submit" class="bbtn bbtn-primary">
          <i class="ti ti-device-floppy"></i> 保存档案修改
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
